<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vakit Sayacı</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vakit">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50' y='50' font-family='sans-serif' font-size='50' fill='%23cda434' text-anchor='middle' dy='.35em'%3EV%3C/text%3E%3C/svg%3E">
    <!-- Apple touch icon uses the same SVG but requires png normally, Safari 15+ supports svg though -->
    <link rel="apple-touch-icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50' y='50' font-family='sans-serif' font-size='50' fill='%23cda434' text-anchor='middle' dy='.35em'%3EV%3C/text%3E%3C/svg%3E">

    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Loader -->
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Vakitler Hesaplanıyor...</p>
        </div>

        <!-- Timer UI -->
        <div id="app" class="hidden fade">
            <h1 id="title" class="title">...</h1>
            <div id="timer" class="timer">
                <div class="time-part">
                    <span class="time-value" id="hours">00</span>
                    <span class="time-label">saat</span>
                </div>
                <div class="time-separator">:</div>
                <div class="time-part">
                    <span class="time-value" id="minutes">00</span>
                    <span class="time-label">dakika</span>
                </div>
                <div class="time-separator">:</div>
                <div class="time-part">
                    <span class="time-value" id="seconds">00</span>
                    <span class="time-label">saniye</span>
                </div>
            </div>
            <div id="target-info" class="target-info">
                Hedef Vakit: <span id="target-time">--:--</span>
            </div>

            <!-- Accordion Themes -->
            <div class="calendar-accordion theme-accordion">
                <button class="accordion-header" id="theme-btn">Tema Seç <span class="arrow">▼</span></button>
                <div class="accordion-content" id="theme-content">
                    <div class="theme-list">
                        <button class="theme-btn" data-theme="black" title="Klasik Siyah (Onyx Black)">
                            <span class="theme-preview black"></span>
                        </button>
                        <button class="theme-btn" data-theme="mosque"
                            title="Gece Mavisi & Cami Silüeti (Deep Night Mosque)">
                            <span class="theme-preview mosque"></span>
                        </button>
                        <button class="theme-btn" data-theme="arabesque"
                            title="Modern Ramazan Deseni (Geometric Arabesque)">
                            <span class="theme-preview arabesque"></span>
                        </button>
                        <button class="theme-btn" data-theme="dynamic" title="Dinamik Tema (Gündüz Açık, Gece Koyu)">
                            <span class="theme-preview dynamic">🌓</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Accordion Calendar -->
            <div class="calendar-accordion">
                <button class="accordion-header" id="calendar-btn">İmsakiye <span class="arrow">▼</span></button>
                <div class="accordion-content" id="calendar-content">
                    <div class="calendar-list" id="calendar-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Error UI -->
        <div id="error" class="hidden fade error-container">
            <p id="error-message">Bağlantı hatası.</p>
            <button onclick="location.reload()" class="retry-btn">Tekrar Dene</button>
        </div>
    </div>

    <script src="./app.js"></script>
</body>

</html>
