<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vakit Sayacı</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vakit">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Cpath d='M20,80 L20,60 C20,50 30,50 30,60 L30,80 M35,80 L35,50 C35,40 45,40 50,30 C55,40 65,40 65,50 L65,80 M70,80 L70,60 C70,50 80,50 80,60 L80,80' stroke='%23d4af37' stroke-width='2' fill='none'/%3E%3Cpath d='M85,30 A10,10 0 1,1 85,20 A12,12 0 1,0 85,30' fill='%23d4af37'/%3E%3C/svg%3E">
    <!-- Apple touch icon uses the specific png generation -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">

    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="mosque-silhouette">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="currentColor" fill-opacity="1"
                d="M0,320 L0,220 C100,220 150,150 200,150 C250,150 300,230 400,230 C450,230 500,100 600,100 C700,100 750,250 800,250 C850,250 900,120 1000,120 C1100,120 1150,200 1200,200 C1300,200 1350,160 1440,160 L1440,320 Z">
            </path>
            <!-- Minarets -->
            <rect x="200" y="80" width="8" height="70" fill="currentColor"></rect>
            <polygon points="198,80 204,60 210,80" fill="currentColor"></polygon>

            <rect x="580" y="40" width="12" height="60" fill="currentColor"></rect>
            <polygon points="576,40 586,10 596,40" fill="currentColor"></polygon>
            <rect x="620" y="40" width="12" height="60" fill="currentColor">
                </currentColor>
                <polygon points="616,40 626,10 636,40" fill="currentColor"></polygon>

                <rect x="1000" y="60" width="10" height="60" fill="currentColor"></rect>
                <polygon points="996,60 1005,30 1014,60" fill="currentColor"></polygon>
        </svg>
    </div>

    <div class="container">
        <!-- Loader -->
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Vakitler Hesaplanıyor...</p>
        </div>

        <!-- Timer UI -->
        <div id="app" class="hidden fade">
            <h1 id="title" class="title">...</h1>
            <div id="timer" class="timer">
                <div class="time-part">
                    <span class="time-value" id="hours">00</span>
                    <span class="time-label">saat</span>
                </div>
                <div class="time-separator">:</div>
                <div class="time-part">
                    <span class="time-value" id="minutes">00</span>
                    <span class="time-label">dakika</span>
                </div>
                <div class="time-separator">:</div>
                <div class="time-part">
                    <span class="time-value" id="seconds">00</span>
                    <span class="time-label">saniye</span>
                </div>
            </div>
            <div id="target-info" class="target-info">
                Hedef Vakit: <span id="target-time">--:--</span>
            </div>

            <!-- Accordion Themes -->
            <div class="calendar-accordion theme-accordion">
                <button class="accordion-header" id="theme-btn">Tema Seç <span class="arrow">▼</span></button>
                <div class="accordion-content" id="theme-content">
                    <div class="theme-list">
                        <button class="theme-btn" data-theme="black" title="Klasik Siyah (Onyx Black)">
                            <span class="theme-preview black"></span>
                        </button>
                        <button class="theme-btn" data-theme="mosque"
                            title="Gece Mavisi & Cami Silüeti (Deep Night Mosque)">
                            <span class="theme-preview mosque"></span>
                        </button>
                        <button class="theme-btn" data-theme="arabesque"
                            title="Modern Ramazan Deseni (Geometric Arabesque)">
                            <span class="theme-preview arabesque"></span>
                        </button>
                        <button class="theme-btn" data-theme="dynamic" title="Dinamik Tema (Gündüz Açık, Gece Koyu)">
                            <span class="theme-preview dynamic">🌓</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Accordion Calendar -->
            <div class="calendar-accordion">
                <button class="accordion-header" id="calendar-btn">İmsakiye <span class="arrow">▼</span></button>
                <div class="accordion-content" id="calendar-content">
                    <div class="calendar-list" id="calendar-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Error UI -->
        <div id="error" class="hidden fade error-container">
            <p id="error-message">Bağlantı hatası.</p>
            <button onclick="location.reload()" class="retry-btn">Tekrar Dene</button>
        </div>
    </div>

    <script src="./app.js"></script>
</body>

</html>
